name: Deploy to IONOS via SFTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Create environment file for production
      run: |
        cat << 'EOF' > kdms.env
        CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
        ADMIN_PASSWORD_HASH=${{ secrets.ADMIN_PASSWORD_HASH }}
        EOF

    - name: Install dependencies
      run: npm ci || npm install

    - name: Build Astro project
      run: npm run build

    - name: Prepare files for deployment
      run: |
        mkdir -p ftp_deploy
        # Copier tout le build Astro (inclus les fichiers cachés comme .htaccess)
        cp -a dist/. ftp_deploy/
        # Copier les APIs PHP
        mkdir -p ftp_deploy/api
        cp -a api/*.php ftp_deploy/api/
        # Copier le fichier d'environnement généré
        cp kdms.env ftp_deploy/kdms.env

    - name: Clean server directory
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22
        script: |
          # Vider le dossier pour un déploiement propre (pas de soucis de fichiers cachés car on utilise kdms.env)
          rm -rf ./public/*

    - name: Sync files to IONOS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 22
        # Ne pas utiliser l'astérisque sinon les fichiers cachés (.env, .htaccess) sont ignorés
        source: "ftp_deploy"
        target: "./public/"
        strip_components: 1